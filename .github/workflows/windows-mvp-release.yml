name: windows-mvp-release

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Optional shared run ID containing both QA and soak evidence artifacts."
        required: false
        type: string
        default: ""
      qa_source_run_id:
        description: "Optional run ID containing the QA evidence artifact. Falls back to source_run_id."
        required: false
        type: string
        default: ""
      soak_source_run_id:
        description: "Optional run ID containing the soak evidence artifact. Falls back to source_run_id."
        required: false
        type: string
        default: ""
      qa_report_artifact:
        description: "Artifact name containing one sanitized Windows MVP QA report JSON."
        required: true
        type: string
        default: windows-mvp-qa-report
      soak_report_artifact:
        description: "Artifact name containing one full-duration Windows MVP soak report JSON."
        required: true
        type: string
        default: windows-mvp-soak-report

run-name: windows-mvp-release evidence bundle

permissions:
  actions: read
  contents: read

concurrency:
  group: windows-mvp-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile

      - name: Validate release evidence sources
        env:
          RELEASE_EVIDENCE_DIR: ${{ github.workspace }}/release-evidence
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
          QA_SOURCE_RUN_ID: ${{ inputs.qa_source_run_id }}
          SOAK_SOURCE_RUN_ID: ${{ inputs.soak_source_run_id }}
          QA_REPORT_ARTIFACT: ${{ inputs.qa_report_artifact }}
          SOAK_REPORT_ARTIFACT: ${{ inputs.soak_report_artifact }}
        run: |
          set -euo pipefail

          mkdir -p "$RELEASE_EVIDENCE_DIR/manifest"

          args=(
            "run"
            "release:windows-mvp-evidence-sources"
            "--"
            "--out-file"
            "$RELEASE_EVIDENCE_DIR/manifest/windows-mvp-release-evidence-sources.json"
            "--dispatch-inputs-file"
            "$RELEASE_EVIDENCE_DIR/manifest/windows-mvp-release-workflow-inputs.json"
          )

          if [ -n "$SOURCE_RUN_ID" ]; then
            args+=("--source-run-id" "$SOURCE_RUN_ID")
          fi
          if [ -n "$QA_SOURCE_RUN_ID" ]; then
            args+=("--qa-source-run-id" "$QA_SOURCE_RUN_ID")
          fi
          if [ -n "$SOAK_SOURCE_RUN_ID" ]; then
            args+=("--soak-source-run-id" "$SOAK_SOURCE_RUN_ID")
          fi
          if [ -n "$QA_REPORT_ARTIFACT" ]; then
            args+=("--qa-report-artifact" "$QA_REPORT_ARTIFACT")
          fi
          if [ -n "$SOAK_REPORT_ARTIFACT" ]; then
            args+=("--soak-report-artifact" "$SOAK_REPORT_ARTIFACT")
          fi

          bun "${args[@]}"

      - name: Download QA and soak evidence artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_EVIDENCE_DIR: ${{ github.workspace }}/release-evidence
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
          QA_SOURCE_RUN_ID: ${{ inputs.qa_source_run_id }}
          SOAK_SOURCE_RUN_ID: ${{ inputs.soak_source_run_id }}
          QA_REPORT_ARTIFACT: ${{ inputs.qa_report_artifact }}
          SOAK_REPORT_ARTIFACT: ${{ inputs.soak_report_artifact }}
        run: |
          set -euo pipefail

          mkdir -p "$RELEASE_EVIDENCE_DIR/qa" "$RELEASE_EVIDENCE_DIR/soak"

          resolve_source_run_id() {
            local explicit_run_id="$1"
            local fallback_run_id="$2"
            local evidence_label="$3"

            if [ -n "$explicit_run_id" ]; then
              printf '%s\n' "$explicit_run_id"
              return 0
            fi

            if [ -n "$fallback_run_id" ]; then
              printf '%s\n' "$fallback_run_id"
              return 0
            fi

            echo "::error::${evidence_label} evidence requires either a dedicated source run ID or source_run_id"
            return 1
          }

          qa_source_run_id="$(resolve_source_run_id "$QA_SOURCE_RUN_ID" "$SOURCE_RUN_ID" "QA")"
          soak_source_run_id="$(resolve_source_run_id "$SOAK_SOURCE_RUN_ID" "$SOURCE_RUN_ID" "soak")"

          gh run download "$qa_source_run_id" \
            --repo "$GITHUB_REPOSITORY" \
            --name "$QA_REPORT_ARTIFACT" \
            --dir "$RELEASE_EVIDENCE_DIR/qa"

          gh run download "$soak_source_run_id" \
            --repo "$GITHUB_REPOSITORY" \
            --name "$SOAK_REPORT_ARTIFACT" \
            --dir "$RELEASE_EVIDENCE_DIR/soak"

      - name: Resolve downloaded evidence files
        env:
          RELEASE_EVIDENCE_DIR: ${{ github.workspace }}/release-evidence
        run: |
          set -euo pipefail

          resolve_json() {
            local evidence_dir="$1"
            mapfile -t files < <(find "$evidence_dir" -type f -name '*.json' | sort)
            if [ "${#files[@]}" -ne 1 ]; then
              echo "::error::expected exactly one JSON file under $evidence_dir, found ${#files[@]}"
              return 1
            fi
            printf '%s\n' "${files[0]}"
          }

          qa_report_file="$(resolve_json "$RELEASE_EVIDENCE_DIR/qa")"
          soak_report_file="$(resolve_json "$RELEASE_EVIDENCE_DIR/soak")"

          {
            echo "QA_REPORT_FILE=$qa_report_file"
            echo "SOAK_REPORT_FILE=$soak_report_file"
          } >> "$GITHUB_ENV"

      - name: Generate release environment preflight evidence
        env:
          RELEASE_EVIDENCE_DIR: ${{ github.workspace }}/release-evidence
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          AKRAZ_WINDOWS_SIGNING_CERT_BASE64: ${{ secrets.AKRAZ_WINDOWS_SIGNING_CERT_BASE64 }}
          AKRAZ_WINDOWS_SIGNING_CERT_PASSWORD: ${{ secrets.AKRAZ_WINDOWS_SIGNING_CERT_PASSWORD }}
        run: |
          set -euo pipefail

          mkdir -p "$RELEASE_EVIDENCE_DIR/signing" "$RELEASE_EVIDENCE_DIR/updater"

          bun run release:signing-preflight -- \
            --out-file "$RELEASE_EVIDENCE_DIR/signing/windows-mvp-signing-preflight.json"

          bun run release:updater-config-preflight -- \
            --out-file "$RELEASE_EVIDENCE_DIR/updater/windows-mvp-updater-config-preflight.json"

      - name: Build Windows MVP release bundle
        env:
          RELEASE_BUNDLE_DIR: ${{ github.workspace }}/release-bundle
          RELEASE_EVIDENCE_DIR: ${{ github.workspace }}/release-evidence
        run: |
          set -euo pipefail

          bun run release:windows-mvp-bundle -- \
            --evidence-sources-file "$RELEASE_EVIDENCE_DIR/manifest/windows-mvp-release-evidence-sources.json" \
            --qa-report-file "$QA_REPORT_FILE" \
            --soak-report-file "$SOAK_REPORT_FILE" \
            --signing-preflight-file "$RELEASE_EVIDENCE_DIR/signing/windows-mvp-signing-preflight.json" \
            --updater-config-preflight-file "$RELEASE_EVIDENCE_DIR/updater/windows-mvp-updater-config-preflight.json" \
            --out-dir "$RELEASE_BUNDLE_DIR"

      - name: Verify Windows MVP release bundle artifact integrity
        env:
          RELEASE_BUNDLE_DIR: ${{ github.workspace }}/release-bundle
        run: |
          set -euo pipefail

          bun run smoke:windows-mvp-release-bundle -- --bundle-dir "$RELEASE_BUNDLE_DIR"

      - name: Upload Windows MVP release bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-mvp-release-bundle
          path: release-bundle/*.json
          if-no-files-found: warn
          retention-days: 14
