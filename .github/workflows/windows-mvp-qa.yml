name: windows-mvp-qa

on:
  workflow_dispatch:
    inputs:
      qa_report_json:
        description: "Complete sanitized Windows MVP QA report JSON. Use either this or qa_report_base64."
        required: false
        type: string
        default: ""
      qa_report_base64:
        description: "Base64-encoded sanitized Windows MVP QA report JSON. Use either this or qa_report_json."
        required: false
        type: string
        default: ""

run-name: windows-mvp-qa report

permissions:
  contents: read

concurrency:
  group: windows-mvp-qa-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile

      - name: Write QA report input
        env:
          QA_REPORT_BASE64: ${{ inputs.qa_report_base64 }}
          QA_REPORT_FILE: ${{ github.workspace }}/release-evidence/qa/windows-mvp-qa-report.json
          QA_REPORT_JSON: ${{ inputs.qa_report_json }}
        run: |
          set -euo pipefail

          mkdir -p "$(dirname "$QA_REPORT_FILE")"
          bun --eval '
            import { writeFileSync } from "node:fs";

            const base64Report = (process.env.QA_REPORT_BASE64 ?? "").trim();
            const reportFile = process.env.QA_REPORT_FILE;
            const inlineReport = (process.env.QA_REPORT_JSON ?? "").trim();
            if (!reportFile) {
              throw new Error("QA_REPORT_FILE is required");
            }
            const hasInlineReport = inlineReport.length > 0;
            const hasBase64Report = base64Report.length > 0;
            if (hasInlineReport === hasBase64Report) {
              throw new Error("provide exactly one of qa_report_json or qa_report_base64");
            }

            const reportJson =
              hasBase64Report
                ? Buffer.from(base64Report, "base64").toString("utf8").trimEnd()
                : inlineReport;

            JSON.parse(reportJson);
            writeFileSync(reportFile, `${reportJson}\n`, "utf8");
          '

      - name: Validate Windows MVP QA report
        env:
          QA_EVALUATION_FILE: ${{ github.workspace }}/release-evidence/qa-evaluation/windows-mvp-qa-report-evaluation.json
          QA_REPORT_FILE: ${{ github.workspace }}/release-evidence/qa/windows-mvp-qa-report.json
        run: |
          set -euo pipefail

          mkdir -p "$(dirname "$QA_EVALUATION_FILE")"
          bun run qa:windows-mvp-report -- \
            --report-file "$QA_REPORT_FILE" \
            --out-file "$QA_EVALUATION_FILE"

      - name: Upload Windows MVP QA report
        uses: actions/upload-artifact@v7
        with:
          name: windows-mvp-qa-report
          path: release-evidence/qa/windows-mvp-qa-report.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload Windows MVP QA evaluation
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: windows-mvp-qa-evaluation
          path: release-evidence/qa-evaluation/windows-mvp-qa-report-evaluation.json
          if-no-files-found: warn
          retention-days: 14
