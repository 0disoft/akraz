name: check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust:
    strategy:
      matrix:
        include:
          - os: windows-latest
            cargo_scope: "--workspace"
          - os: ubuntu-latest
            cargo_scope: "--workspace --exclude akraz-app"
          - os: macos-latest
            cargo_scope: "--workspace --exclude akraz-app"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cargo build -p akraz-daemon
          New-Item -ItemType Directory -Force apps/akraz/src-tauri/binaries
          Copy-Item target/debug/akraz-daemon.exe apps/akraz/src-tauri/binaries/akraz-daemon-x86_64-pc-windows-msvc.exe
      - run: cargo clippy ${{ matrix.cargo_scope }} --all-targets -- -D warnings
      - run: cargo test ${{ matrix.cargo_scope }}

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run test
      - run: bun run check
      - run: bun run format:check
      - run: bun run lint

  smoke:
    needs:
      - rust
      - frontend
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run smoke:loopback-transport
      - run: bun run smoke:tcp-transport
      - run: bun run smoke:peer-session
      - run: bun run smoke:peer-session-executor
      - run: bun run smoke:session-connect-lifecycle
      - run: bun run smoke:daemon-lifecycle
      - run: bun run smoke:settings-start
